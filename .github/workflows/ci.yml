name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fastify_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install nub
        run: npm install -g @nubjs/nub

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Lint
        run: nubx eslint src

      - name: Run migrations
        run: nubx drizzle-kit migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fastify_test

      - name: Run tests
        run: nubx vitest run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fastify_test
          JWT_SECRET: ci_test_secret_that_is_at_least_32_characters
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Build
        run: nub run build
