services:
  postgres:
    image: postgres:16-alpine
    container_name: fastify_postgres
    environment:
      POSTGRES_DB: fastify_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fastify_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: deps
    container_name: fastify_app
    restart: unless-stopped
    command: nub watch src/server.ts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
      JWT_SECRET: change_this_to_a_random_string_at_least_32_characters
      REDIS_URL: redis://redis:6379
      COOKIE_SECRET: ''
      OTEL_ENDPOINT: ''
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./eslint.config.js:/app/eslint.config.js:ro
      - ./vitest.config.ts:/app/vitest.config.ts:ro

  drizzle-studio:
    build:
      context: .
      target: deps
    container_name: fastify_drizzle_studio
    command: ['node_modules/.bin/drizzle-kit', 'studio', '--port', '4983', '--host', '0.0.0.0']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/fastify_dev
    ports:
      - '4983:4983'
    volumes:
      - ./drizzle.config.ts:/app/drizzle.config.ts:ro
      - ./src/db/schema:/app/src/db/schema:ro
      - ./migrations:/app/migrations

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fastify_pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
